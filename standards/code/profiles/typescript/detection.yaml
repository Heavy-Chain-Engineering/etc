profile: typescript
markers:
  - package.json
  - tsconfig.json
file_globs:
  # fnmatch doesn't recursively expand **; both top-level and nested
  # patterns are needed to cover file_path=script.ts AND file_path=src/x/y.ts.
  - "*.ts"
  - "**/*.ts"
  - "*.tsx"
  - "**/*.tsx"
  - "*.mts"
  - "**/*.mts"
  - "*.cts"
  - "**/*.cts"
exclude_globs:
  # fnmatch doesn't recursively expand **; both top-level and nested
  # patterns are needed to cover monorepo and workspace shapes.
  - "node_modules/**"
  - "**/node_modules/**"
  - "dist/**"
  - "**/dist/**"
  - "build/**"
  - "**/build/**"
  - ".next/**"
  - "**/.next/**"
  - ".turbo/**"
  - "**/.turbo/**"
  - "coverage/**"
  - "**/coverage/**"
  - "**/*.d.ts"
canonical_sources:
  - https://google.github.io/styleguide/tsguide.html
  - https://typescript-eslint.io/rules/
  - https://github.com/airbnb/javascript
