profile: python
markers:
  - pyproject.toml
  - setup.py
  - uv.lock
  - Pipfile
  - poetry.lock
file_globs:
  # fnmatch doesn't recursively expand **; both top-level and nested
  # patterns are needed to cover both file_path=bad.py and file_path=src/x/y.py.
  - "*.py"
  - "**/*.py"
  - "*.pyi"
  - "**/*.pyi"
exclude_globs:
  # fnmatch doesn't recursively expand **; both top-level and nested
  # patterns are needed to cover monorepo and workspace shapes.
  - "__pycache__/**"
  - "**/__pycache__/**"
  - ".venv/**"
  - "**/.venv/**"
  - "venv/**"
  - "**/venv/**"
  - ".tox/**"
  - "**/.tox/**"
  - "build/**"
  - "**/build/**"
  - "dist/**"
  - "**/dist/**"
  - ".pytest_cache/**"
  - "**/.pytest_cache/**"
  - ".mypy_cache/**"
  - "**/.mypy_cache/**"
  - ".ruff_cache/**"
  - "**/.ruff_cache/**"
canonical_sources:
  - https://peps.python.org/pep-0008/
  - https://google.github.io/styleguide/pyguide.html
  - https://docs.astral.sh/ruff/rules/
  - https://mypy.readthedocs.io/
