# ═══════════════════════════════════════════════════════════════════════════
# Ruff Reference Configuration
#
# This is a REFERENCE configuration for consumer projects. Copy this file
# into your project's pyproject.toml [tool.ruff] section, or reference it
# via ruff's extends mechanism.
#
# This config maps to the enforcement annotations in standards/code/*.md
# and standards/testing/*.md. Every ruff() annotation in those docs
# references a rule enabled here.
#
# DO NOT apply this to the etc-system-engineering repo itself — this repo
# contains standards docs and hooks, not Python application code.
# ═══════════════════════════════════════════════════════════════════════════

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors — E402 (import placement), E722 (bare except), whitespace
    "F",     # pyflakes — F401 (unused imports), F841 (unused variables), F811 (redefined)
    "I",     # isort — import sorting
    "W",     # pycodestyle warnings — trailing whitespace, blank lines
    "N",     # pep8-naming — N818 (exception suffix), N802 (function naming), N801 (class naming)
    "UP",    # pyupgrade — UP024 (os-error-alias), UP007 (union syntax), UP006 (lowercase generics)
    "B",     # flake8-bugbear — B001 (bare except), B006 (mutable default args), B018 (no-op)
    "C90",   # mccabe — C901 (cyclomatic complexity)
    "ERA",   # eradicate — ERA001 (commented-out code)
    "SIM",   # flake8-simplify — simplifiable expressions, contextlib.suppress
    "T20",   # flake8-print — T201 (no print statements)
    "PLR",   # pylint refactor — PLR0913 (too many args), PLR0915 (too many statements)
    "ANN",   # flake8-annotations — ANN001-003 (missing annotations), ANN401 (no Any)
    "BLE",   # flake8-blind-except — BLE001 (blind exception catch)
    "TRY",   # tryceratops — TRY301 (raise within try), TRY201 (verbose raise)
    "TCH",   # type-checking — imports for type-checking only
    "PT",    # flake8-pytest-style — PT018 (composite assertions)
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "ANN",      # Test annotations optional per typing-standards.md
    "PLR0913",  # Test factories may have many parameters
]
