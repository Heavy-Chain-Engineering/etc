services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: etc_platform
      POSTGRES_USER: etc
      POSTGRES_PASSWORD: etc_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etc -d etc_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
