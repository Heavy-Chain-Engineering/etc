# ═════���═════════════════════════════════════════════════════════════════════
# etc — Engineering Team, Codified
# SDLC Specification v1.0
#
# This file is the SINGLE SOURCE OF TRUTH for the engineering harness.
# Everything else — hooks, scripts, agents, skills, standards — is a
# compiled artifact derived from this specification.
#
# To modify the harness: edit this file, then run:
#   python3 compile-sdlc.py spec/etc_sdlc.yaml
#   ./install.sh
#
# ═══════════════════════════════════════════════════════════════════════════

version: "1.0"

# ─── Defaults ────────────────────────────────────────────────────────────
# Applied to all gates unless overridden at the gate level.
defaults:
  model: haiku                            # Default: fast/cheap for mechanical checks. Override per gate where reasoning matters.
  on_failure: block            # block = give agent feedback to retry
  on_loop: escalate            # escalate = fail loud, kill agent, tell human
  max_retries: 2               # After N retries on same gate, escalate
  coverage_threshold: 98       # Minimum test coverage percentage
  changeset_budget:
    target_loc: 300            # Ideal lines of code per task
    warn_loc: 500              # Warn if task exceeds this
    max_loc: 1000              # Block if task exceeds this

# ─── Task File Format ───────────────────────────────────────────────────
# Tasks are the contract between the orchestrator and subagents.
# Generated during PRD decomposition by the /implement skill.
# Stored in: .etc_sdlc/tasks/{task_id}-{slug}.yaml
task_format:
  location: .etc_sdlc/tasks
  fields:
    task_id:          { required: true,  type: string, description: "Hierarchical ID (e.g., '001', '001.001' for subtask)" }
    title:            { required: true,  type: string, description: "Human-readable task title" }
    assigned_agent:   { required: true,  type: string, description: "Agent role from agents section (e.g., 'backend-developer')" }
    status:           { required: true,  type: enum,   values: [pending, in_progress, completed, blocked, escalated, decomposed] }
    requires_reading: { required: true,  type: list,   description: "Files the agent MUST read before implementing" }
    files_in_scope:   { required: true,  type: list,   description: "Files the agent is allowed to create/modify" }
    acceptance_criteria: { required: true, type: list,  description: "Measurable criteria — all must pass for task to be 'done'" }
    dependencies:     { required: false, type: list,   description: "Task IDs that must complete before this task starts" }
    parent_task:      { required: false, type: string,  description: "Parent task ID if this is a subtask (enables recursive decomposition)" }
    complexity:       { required: false, type: integer, description: "Complexity score 1-10 (auto-calculated from criteria + files)" }
    wave:             { required: false, type: integer, description: "Execution wave (0=first, tasks in same wave can parallelize)" }
    context:          { required: false, type: string,  description: "Additional context from the PRD or decomposition" }

# ─── Gates ────���─────────────────────────────────────���────────────────────
# Each gate compiles to one or more hooks in settings-hooks.json.
# Gates are the mechanical enforcement of engineering practices.
#
# Types:
#   command  — deterministic shell script, fast (<1s), binary pass/fail
#   prompt   — single LLM call with role, judgment-based (~5s)
#   agent    — multi-turn LLM with tool access, verification-based (~30-60s)
#
# Hooks under the same event run in parallel. Most restrictive result wins.
# This enforces an ALL-must-pass rule, not OR.

gates:

  # ── Preconditions: Before Work Begins ──────────────────────────────────

  safety-guardrails:
    description: >
      Blocks destructive shell commands. The equivalent of "production access
      requires approval." Prevents rm -rf, force push, DROP TABLE, etc.
    event: PreToolUse
    matcher: "Bash"
    type: command
    script: block-dangerous-commands.sh
    on_failure: block

  tier-0-preflight:
    description: >
      Blocks code edits when Tier 0 domain context is missing from the repo root.
      Tier 0 = DOMAIN.md (what business, stakes, canonical terms) + PROJECT.md
      (what this codebase is, where resources live). Without these, agents
      fabricate business assumptions and cannot ground their reasoning.
      Read-only exploration is still allowed so agents can gather the context
      they need to create the missing files via /init-project.
    event: PreToolUse
    matcher: "Edit|Write"
    type: command
    script: check-tier-0.sh
    timeout: 5
    on_failure: block

  tdd-gate:
    description: >
      Enforces write-test-first TDD. Blocks edits to production source files
      unless a corresponding test file already exists. This is non-negotiable —
      the test is the specification, the implementation satisfies it.
    event: PreToolUse
    matcher: "Edit|Write"
    type: command
    script: check-test-exists.sh
    timeout: 5
    on_failure: block

  invariant-check:
    description: >
      Validates project invariants from INVARIANTS.md before allowing code
      modifications. Invariants are machine-verifiable contracts declared at
      the project and component level. Any violation blocks the edit.
    event: PreToolUse
    matcher: "Edit|Write"
    type: command
    script: check-invariants.sh
    timeout: 10
    on_failure: block

  code-quality-check:
    description: >
      Detects non-lintable code quality violations via AST analysis:
      module-level mutable state and no-op functions.
    event: PreToolUse
    matcher: "Edit|Write"
    type: command
    script: check-code-quality.sh
    timeout: 10
    on_failure: block

  enough-context:
    description: >
      Checks whether the agent has read the files declared in the active task's
      requires_reading list before attempting code changes. Converts a judgment
      call into a deterministic checklist. The task file is the contract.
    event: PreToolUse
    matcher: "Edit|Write"
    type: command
    script: check-required-reading.sh
    timeout: 10
    on_failure: block

  phase-gate:
    description: >
      Blocks file edits inappropriate for the current SDLC phase.
      During Spec, you can't edit source code. During Build, you
      can't rewrite the PRD. Phase discipline, mechanically enforced.
    event: PreToolUse
    matcher: "Edit|Write"
    type: command
    script: check-phase-gate.sh
    on_failure: block

  # ── Cross-Boundary Concepts: Verify Phase ───────────────────────────

  seam-evidence-check:
    description: >
      Validates integration seam evidence from SEAMS.md. For each declared
      seam, checks that the integration test exists, has the correct marker,
      exercises both sides (L2+), and uses real dependencies (L3). Runs at
      verify phase only -- not per-edit.
    event: Stop
    type: command
    script: check-seam-evidence.sh
    timeout: 30
    on_failure: block

  concept-check:
    description: >
      Validates cross-boundary CONCEPT entries from INVARIANTS.md at verify
      phase. CONCEPT verify commands scan multiple directories for semantic
      consistency across bounded contexts. Runs separately from the per-edit
      check-invariants.sh to avoid degrading edit-time hook latency.
    event: PostToolUse
    matcher: "Task"
    type: command
    script: check-concepts.sh
    timeout: 30
    on_failure: block

  value-hypothesis-schema:
    description: >
      Validates that any value-hypothesis.yaml written or edited conforms to the
      canonical v1 schema (BR-005 / AC-004). Closes the write-time gate that
      let F012-F019 ship with an alternative who/what/why shape — invisible
      to git (`.etc_sdlc/*` is gitignored) and invisible to all gates except
      /metrics. Only triggers when the edited path ends in `value-hypothesis.yaml`.
    event: PostToolUse
    matcher: "Edit|Write"
    type: command
    script: check-value-hypothesis-schema.sh
    timeout: 10
    on_failure: block

  # ── During Work: Tracking ───────────────────────────────────────────

  dirty-marker:
    description: >
      Touches .tdd-dirty breadcrumb when production source code is modified.
      Zero-cost tracking for the CI pipeline gate. Never blocks.
    event: PostToolUse
    matcher: "Edit|Write"
    type: command
    script: mark-dirty.sh
    on_failure: allow  # Never blocks — just tracking

  # ── Task Lifecycle: Assignment & Completion ────────────────────────────

  task-readiness:
    description: >
      Definition of Ready for subtasks. When the orchestrator creates a task
      and assigns it to a subagent, this gate validates that the task file
      has clear scope, acceptance criteria, and required reading list.
      Mirrors "is this ticket refined enough for a developer to pick up?"
    event: TaskCreated
    type: prompt
    role: |
      You are a senior engineering manager who has refined thousands of
      tickets. You know that vague tasks produce vague implementations.
      A task is only ready when a developer can read it and know exactly
      what to build, what files to touch, and how to verify they're done.
    prompt: |
      A task is being assigned to an agent:

      $ARGUMENTS

      ════════════════════════════════════════════════════════════════════
      SHAPE CHECK — built-in TaskCreate todos skip this gate
      ════════════════════════════════════════════════════════════════════

      The TaskCreated event fires for TWO very different things:

      1. **Formal ETC task assignment** (what this gate was built for).
         $ARGUMENTS contains a YAML-like task file whose top-level keys
         include at minimum `task_id`, `files_in_scope`,
         `acceptance_criteria`, `requires_reading`, and `assigned_agent`.
         These come from /decompose writing task files under
         .etc_sdlc/features/*/tasks/. Evaluate the DoR checklist below
         on these.

      2. **Built-in TaskCreate todo** used by the agent for in-context
         progress tracking. $ARGUMENTS contains only `{title, status,
         activeForm}` or similar — no files_in_scope, no
         acceptance_criteria, no requires_reading. These are lightweight
         todos the agent uses to stay organized inside a single turn.
         They are NOT work assignments and DoR does not apply to them.
         Allow immediately with {"ok": true}.

      Decision rule: if $ARGUMENTS contains NONE of the fields
      `task_id`, `files_in_scope`, `acceptance_criteria`, or
      `requires_reading`, it is a built-in todo. Respond with
      {"ok": true} and do not evaluate the DoR checklist.

      ════════════════════════════════════════════════════════════════════
      Definition of Ready (for formal ETC task files only)
      ════════════════════════════════════════════════════════════════════

      A task is NOT ready if:
      - The description is fewer than 2 sentences
      - It lacks specific, measurable acceptance criteria
      - It doesn't specify which files/modules are in scope
      - It has no requires_reading list
      - Dependencies are unclear or circular

      Respond with ONLY valid JSON:
      {"ok": true} if the task meets Definition of Ready OR is a built-in
        TaskCreate todo (see shape check above).
      {"ok": false, "reason": "Specific gaps: [what's missing]"} if the
        task is a formal ETC task file that fails the checklist.
    on_failure: block

  task-completion:
    description: >
      Definition of Done for completed tasks. When an agent claims a task
      is complete, this gate verifies the deliverable actually matches the
      task description and acceptance criteria. Runs tests, checks coverage,
      inspects the work product.
    event: TaskCompleted
    type: agent
    role: |
      You are a QA lead who has seen developers mark tasks "done" when
      they're clearly not. Your job is to mechanically verify every
      acceptance criterion. You don't take the developer's word for it —
      you check the code, run the tests, and verify the deliverables exist.
    prompt: |
      An agent claims this task is complete:

      $ARGUMENTS

      ════════════════════════════════════════════════════════════════════
      SHAPE CHECK — built-in TaskCreate todos skip this gate
      ════════════════════════════════════════════════════════════════════

      The TaskCompleted event fires for TWO different shapes:

      1. **Formal ETC task completion.** $ARGUMENTS contains a task file
         reference with `task_id`, `files_in_scope`, and
         `acceptance_criteria`. Apply the DoD verification below.

      2. **Built-in TaskCreate todo completion** used by the agent for
         in-context progress tracking. $ARGUMENTS contains only `{title,
         status}` or similar — no files_in_scope, no acceptance_criteria.
         These are not work deliverables. Allow immediately with
         {"ok": true}.

      Decision rule: if $ARGUMENTS contains NONE of the fields
      `task_id`, `files_in_scope`, or `acceptance_criteria`, it is a
      built-in todo. Respond with {"ok": true} without running any
      verification steps.

      ════════════════════════════════════════════════════════════════════
      Definition of Done (for formal ETC task completions only)
      ════════════════════════════════════════════════════════════════════

      Verify by inspecting the actual codebase:
      1. Every file path listed in `files_in_scope` exists on disk and
         contains the changes the task required.
      2. Tests exist whose assertions map to each acceptance criterion.
      3. Run the project test command. Record whether every test passes.
      4. Coverage of the files in `files_in_scope` meets the project
         threshold declared in the repo's coverage configuration.
      5. For each entry in `acceptance_criteria`, emit a verdict of
         exactly one of: PASS, FAIL, or NOT_APPLICABLE. For FAIL, cite
         the file path and line number or the failing test name. For
         NOT_APPLICABLE, state the concrete reason the criterion does
         not map to observable evidence in this repo.

      The task is verified only when steps 1-4 hold AND every
      acceptance criterion in step 5 is PASS or NOT_APPLICABLE.

      Response shape:
      - Use ONLY valid JSON, no prose outside the JSON object.
      - On verification pass, return {"ok": true}.
      - On verification fail, return {"ok": false, "reason": "..."} where
        the reason string is a single line listing each failed AC as
        "AC-N: FAIL — <evidence>" separated by "; ".

      If this is a second attempt (stop_hook_active=true in $ARGUMENTS) and
      verification still fails:
        Return {"continue": false, "stopReason": "TASK NOT DONE: [details]"}

      Otherwise:
        {"ok": true} if all criteria met OR if this is a built-in todo.
        {"ok": false, "reason": "[what's missing or failing]"} if the task
          is a formal ETC task file that fails the checklist.
    timeout: 90
    max_retries: 2
    on_loop: escalate

  # ── Subagent Lifecycle ─────────────────────────────────────────────────

  standards-injection:
    description: >
      Injects engineering standards and project constraints into every
      subagent's context at spawn time. The "onboarding packet" for new
      team members. Ensures every subagent knows the rules before it starts.
    event: SubagentStart
    type: command
    script: inject-standards.sh

  adversarial-review:
    description: >
      Fresh agent reviews subagent output with adversarial intent.
      "What could go wrong? What did the agent miss? What edge cases
      are unhandled?" Never lets the implementer grade their own work.
    event: SubagentStop
    type: agent
    model: sonnet
    role: |
      You are a hostile code reviewer. Your job is NOT to confirm the
      work looks good — it is to find what is wrong. You have seen
      thousands of bugs escape reviews that were too agreeable.

      You are a FRESH agent with no context from the implementation.
      You review the output cold.

      For each finding you produce, cite the file path and line number.
      Do not return "looks good" unless you have verified every check
      in the prompt's review checklist and found nothing to report.
    prompt: |
      A subagent just completed its work. Review it adversarially.

      $ARGUMENTS

      This is a defensive code-review activity on a codebase owned by
      the operator. All findings are for remediation by the implementer.

      Review procedure — every step is mandatory:

      1. Use the Read tool on every file the subagent modified. Do not
         rely on the subagent's written summary of what it did.
      2. Use the Read tool on every test file that claims to cover
         the change.
      3. For each of the following review dimensions, produce either a
         finding with file:line evidence or the literal string
         "no finding":

         a. Error-handling paths — every raised exception has a
            matching except clause at an appropriate layer; no bare
            `except:` or `except Exception:` that swallows errors.
         b. Empty and null inputs — the implementation handles empty
            string, empty list, empty dict, and None for every public
            parameter declared in the changed code.
         c. Off-by-one conditions — every loop bound, slice index, and
            range expression in the changed code has been checked for
            the first and last element.
         d. Concurrent-access assumptions — any shared state (module
            globals, class attributes, file handles, DB connections)
            either has explicit locking or a documented single-writer
            assumption.
         e. Security boundaries — user-supplied input is validated
            before use; no string interpolation into SQL, shell, or
            file paths; secrets are not logged or echoed.
         f. Test coverage of failure paths — every branch in changed
            code that handles an error condition has at least one test
            that triggers that branch.
         g. Acceptance-criteria compliance — for each criterion in
            the task's `acceptance_criteria`, cite the file:line or
            test name that demonstrates the criterion is satisfied.
         h. Spec compliance — the changed behaviour matches the task
            description; no scope drift, no silently dropped
            requirements.

      Response shape — valid JSON only, no prose outside the JSON
      object:

      If stop_hook_active is true in $ARGUMENTS AND at least one
      finding from a-h is non-null, return:
        {"continue": false,
         "stopReason": "ADVERSARIAL REVIEW FAILED: <one-line summary with file:line>"}

      If any finding from a-h is non-null (first attempt), return:
        {"ok": false,
         "reason": "<one line per finding, 'dimension: <file:line> — <issue>', joined by '; '>"}

      If every finding from a-h is "no finding", return:
        {"ok": true}
    timeout: 90
    max_retries: 1
    on_loop: escalate

  # ── Session Lifecycle ──────────────────────────────────────────────────

  completion-discipline:
    description: >
      Single Stop hook combining CI gate and completion discipline.
      Runs sequentially, not in parallel (prior design had ci-gate and
      completion-discipline as peer hooks racing on the .tdd-dirty
      marker — this version absorbs ci-gate's logic to make the
      sequence deterministic).

      Step 1: if .tdd-dirty is present, run pytest + mypy + ruff +
      invariants. On pass, clear the marker; on fail, block with
      CI output.
      Step 2: if any task has status: in_progress, block with the
      three-valid-exits message (complete / escalate / block).

      Language-agnostic: the agent cannot phrase its way past this
      check. Enforces standards/process/completion-discipline.md.
    event: Stop
    type: command
    script: check-completion-discipline.sh
    timeout: 120
    on_failure: block

  auto-checkpoint:
    description: >
      Auto-checkpoints session state when context is high and checkpoint is stale.
      Blocks stop with exit 2 when context_window.used_percentage >= 85 AND
      .etc_sdlc/checkpoint.md is more than 30 minutes stale or absent. Both
      thresholds env-tunable via CHECKPOINT_CTX_THRESHOLD (default 85) and
      CHECKPOINT_STALE_MINUTES (default 30). Safe-fails to exit 0 when
      context_window field is absent from hook input. F012 / 2026-05-13.
    event: Stop
    type: command
    script: auto-checkpoint.sh
    timeout: 15
    on_failure: block

  chief-efficiency-officer:
    description: >
      Chief Efficiency Officer — Stop-hook reflection layer per Anthropic's
      large-codebase guidance. Observes every Stop event, captures turn timing
      with sleep-gap subtraction, computes active engagement on the current
      task vs operator baseline (sdlc_timing.py), writes evidence-cited
      proposals to .etc_sdlc/efficiency/proposals/ and rolling daily report
      to .etc_sdlc/efficiency/daily/. Threshold-push interrupts the next
      agent turn only on >3-hour active engagement without progress.
      Evidence-based ONLY: every observation cites a data point + baseline +
      gap. Never blocks the Stop event. F019 / 2026-05-15.
    event: Stop
    type: command
    script: chief-efficiency-officer.sh
    timeout: 10
    on_failure: continue

  sandbox-bypass-tracker:
    description: >
      Tracks each Bash invocation with dangerouslyDisableSandbox: true.
      Appends one JSONL line per bypass event to
      .etc_sdlc/efficiency/sandbox-bypasses.jsonl for the Chief Efficiency
      Officer Stop hook to consume. Never blocks. Schema:
      {event_id, started_at, command_snippet, description}. Pairs with F019
      to make bypass discipline observable (F021 audit layer collapsed
      into F019). 2026-05-15.
    event: PreToolUse
    matcher: Bash
    type: command
    script: sandbox-bypass-tracker.sh
    timeout: 5
    on_failure: continue

  change-control:
    description: >
      Prevents the agent from modifying its own governance. Blocks
      unauthorized changes to settings, standards, or hook configurations.
      The agent cannot loosen its own constraints.
    event: ConfigChange
    type: command
    script: block-config-changes.sh
    on_failure: block

  compaction-recovery:
    description: >
      Re-injects critical project context after context compaction. When
      Claude's context window fills up and gets summarized, important details
      can be lost. This hook restores: current SDLC phase, active task,
      project constraints, and recent decisions.
    event: SessionStart
    matcher: compact
    type: command
    script: reinject-context.sh

  precompact-checkpoint:
    description: >
      Auto-checkpoints session state before /compact. etc's first
      PreCompact hook. On an AUTO compaction it always writes a
      best-effort .etc_sdlc/checkpoint.md + journal entry (fail-open,
      exit 0) UNLESS a fresh checkpoint already exists. On a MANUAL
      /compact it is a forcing gate: it BLOCKS (exit 2) when no fresh
      model-reasoned checkpoint exists, with an actionable message, so
      the operator runs /checkpoint first. Pairs with reinject-context.sh
      on SessionStart:compact. #36 + F-2026-05-26-checkpoint-template-and-gate.
    event: PreCompact
    type: command
    script: pre-compact-checkpoint.sh
    timeout: 15
    # Descriptive only: the compiler does not wrap command-hook exit codes
    # (see compile-sdlc.py compile_hooks — on_failure is not emitted to
    # settings-hooks.json), so Claude Code honors the script's exit 2
    # directly. "block" documents the gate's intentional manual-block path.
    on_failure: block

# ─── Agents ────────���─────────────────────────────────────────────────────
# Agent definitions that compile to .md files in dist/agents/.
# Each agent has a role, tools, and behavioral constraints.
# The compiler generates the full agent markdown from these declarations.

agents:
  # ── Orchestration ──────────────────────────────────────────────────────

  sem:
    name: "Software Engineering Manager"
    description: >
      The sole orchestrator. Owns SDLC phase lifecycle, deploys agent teams,
      enforces definition of done between phases, and runs quality watchdogs
      during Build. Never writes code. Never makes architectural decisions.
      Delegates everything.
    tools: [Read, Grep, Glob, Bash, Agent]
    constraints:
      - "You NEVER write code directly — you delegate to specialized agents"
      - "You are stateless between decisions — reload state from .sdlc/state.json"
      - "You gate phase transitions on Definition of Done checklists"
      - "You deploy watchdog agents (code-reviewer, verifier, security-reviewer) during Build"
    source: agents/sem.md  # Existing agent definition to pass through

  # ── Specification & Design ─────────────────────────────────────────────

  product-manager:
    name: "Product Manager"
    description: "Translates business intent into structured PRDs through Socratic questioning."
    source: agents/product-manager.md

  product-owner:
    name: "Product Owner"
    description: "Validates PRDs, writes acceptance criteria, identifies gaps."
    source: agents/product-owner.md

  architect:
    name: "Software Architect"
    description: "Designs boundaries, data flow, integration patterns. Writes ADRs."
    source: agents/architect.md

  researcher:
    name: "Technical Researcher"
    description: "Deep-dives into source material, prior art, domain knowledge."
    source: agents/researcher.md

  domain-modeler:
    name: "Domain Modeler"
    description: "Validates ubiquitous language, bounded contexts, aggregate design."
    source: agents/domain-modeler.md

  # DEPRECATED (F011): ux-designer is superseded by the unified `design` agent
  # below. The entry is retained on disk forward-only so F001-F010 references
  # continue to resolve. New work should target `agents/design.md` instead.
  ux-designer:
    name: "UX Designer"
    description: "[DEPRECATED — use `design` agent] User flows, information architecture, interaction patterns. Superseded by agents/design.md (F011)."
    source: agents/ux-designer.md
    deprecated: true
    replaced_by: design

  # DEPRECATED (F011): ui-designer is superseded by the unified `design` agent
  # below. The entry is retained on disk forward-only so F001-F010 references
  # continue to resolve. New work should target `agents/design.md` instead.
  ui-designer:
    name: "UI Designer"
    description: "[DEPRECATED — use `design` agent] Visual design system, component specs, design tokens. Superseded by agents/design.md (F011)."
    source: agents/ui-designer.md
    deprecated: true
    replaced_by: design

  # F011: unified design agent replaces ux-designer + ui-designer. Wraps
  # impeccable's reference domains + anti-pattern rules; owns user flows,
  # visual specs, design tokens, accessibility, and interaction patterns.
  design:
    name: "Design"
    description: >
      Unified design specialist. Replaces the deprecated ux-designer and
      ui-designer agents (F011). Owns user flows, visual specs, design
      tokens, accessibility attributes, and interaction patterns. Anchored
      on impeccable's 7 reference domains and 27 anti-pattern rules.
      Canonical interactive workflow lives in skills/design/SKILL.md.
    source: agents/design.md
    primary_phase: design
    model: opus
    tools: [Read, Grep, Glob, Write, Edit]

  # ── Implementation ──���──────────────────────────────────────────────────

  backend-developer:
    name: "Backend Developer"
    description: "Clean coder and TDD zealot. Python/FastAPI. Red/Green/Refactor."
    source: agents/backend-developer.md

  frontend-developer:
    name: "Frontend Developer"
    description: "Component thinker and accessibility zealot. TDD."
    source: agents/frontend-developer.md

  hotfix-responder:
    name: "Hotfix Responder"
    description: "Incident response subagent. Bypasses tdd-gate/enough-context/phase-gate for /hotfix execution; safety-guardrails, tier-0-preflight, and check-invariants still fire. Refuses vague incident descriptions."
    source: agents/hotfix-responder.md

  devops-engineer:
    name: "DevOps Engineer"
    description: "Infrastructure-as-code. Docker, CI/CD, monitoring."
    source: agents/devops-engineer.md

  code-simplifier:
    name: "Code Simplifier"
    description: "Refactoring and code quality improvement specialist."
    source: agents/code-simplifier.md

  frontend-dashboard-refactorer:
    name: "Frontend Dashboard Refactorer"
    description: "Phased refactor of large React/TypeScript dashboard modules into types, hooks, and focused components. Behavior-preserving; tests run after every phase."
    source: agents/frontend-dashboard-refactorer.md

  # ── Quality & Review (Watchdogs) ───────────────────────────────────────

  code-reviewer:
    name: "Code Reviewer"
    description: "Reviews completed code. Error handling, data integrity, standards."
    source: agents/code-reviewer.md

  verifier:
    name: "Verifier"
    description: "Mechanical quality gate. Tests, coverage, types, lint. Pass/fail."
    source: agents/verifier.md

  security-reviewer:
    name: "Security Reviewer"
    description: "OWASP-trained. Injection, XSS, auth bypass, secrets, SSRF."
    source: agents/security-reviewer.md

  architect-reviewer:
    name: "Architect Reviewer"
    description: "Reviews architectural compliance and invariant enforcement."
    source: agents/architect-reviewer.md

  # ── Project Lifecycle ────────���─────────────────────────────────────────

  project-bootstrapper:
    name: "Project Bootstrapper"
    description: "Analyzes existing code, generates .meta/ descriptions."
    source: agents/project-bootstrapper.md

  technical-writer:
    name: "Technical Writer"
    description: "API docs, architecture overviews, setup guides, READMEs."
    source: agents/technical-writer.md

  spec-enforcer:
    name: "Spec Enforcer"
    description: >
      Adversarial spec compliance reviewer. Compares deliverables against
      PRD acceptance criteria. Assumes non-compliance until proven otherwise.
      Read-only — blocks on violations but never fixes them.
    source: agents/spec-enforcer.md

  process-evaluator:
    name: "Process Evaluator"
    description: "Retrospectives, metrics collection, improvement recommendations."
    source: agents/process-evaluator.md

  janitor:
    name: "Janitor"
    description: >
      Constrained fix-subagent for the /janitor autonomous-cleanup pipeline.
      Performs exactly ONE flawless cleanup fix inside an isolated git worktree
      and returns a structured result. Dispatched ONLY by the /janitor
      orchestrator (skills/janitor/SKILL.md) — never by /spec or /build. The
      toolset IS the security boundary: no `gh`, no `git push`, no PR/merge, no
      network. All delivery is the orchestrator's privilege.
    source: agents/janitor.md

# ─── Skills ────────────────────────────���─────────────────────────────────
# Skills compile to .md files in dist/skills/.
# The /implement skill is the primary user-facing entry point.

skills:
  hotfix:
    name: "hotfix"
    description: >
      Incident response lane — file an incident, dispatch a constrained
      hotfix-responder subagent, suggest postmortem afterward. Sacrifices
      upfront ceremony for speed; reclaims accountability through audit
      trail, subagent description guardrail, and postmortem-debt banner.
      Safety-guardrails, tier-0-preflight, and check-invariants still fire.
    usage: "/hotfix \"<short description of incident>\""
    source: skills/hotfix/SKILL.md

  metrics:
    name: "metrics"
    description: >
      Non-interactive three-layer metrics report. Reads git tags (process),
      value-hypothesis.yaml files (outcome), and .etc_sdlc/telemetry.db
      (cost), then emits a markdown report to stdout with the headline
      "% hypothesis-validated" broken down by author role.
    usage: "/metrics"
    source: skills/metrics/SKILL.md

  implement:
    name: "implement"
    description: >
      Spec-based implementation workflow. Takes a PRD or specification,
      validates it meets Definition of Ready, decomposes it into tasks,
      dispatches to subagents, and orchestrates the full build cycle.
    usage: "/implement <path-to-spec-or-prd>"
    flow:
      validate_spec:
        description: "Verify the spec/PRD has enough detail to implement"
        on_failure: "Reject immediately with specific gaps"
      decompose_tasks:
        description: "Parse PRD into task graph with dependencies"
        output: ".etc_sdlc/tasks/{task_id}-{slug}.yaml per task"
      dispatch_subagents:
        description: "Assign tasks to subagents respecting dependencies and file-set isolation"
        parallel_rule: "Tasks with overlapping files_in_scope MUST be serialized"
      verify_and_report:
        description: "Run architectural review, full CI, report results to human"
        model: opus  # Final verification uses strongest model

  pull-tickets:
    name: "pull-tickets"
    description: >
      Closed-loop ticket pipeline. Pulls eligible tickets from Linear via MCP,
      generates full PRDs from ticket content and codebase research, runs each
      through the complete SDLC pipeline (/build), and either creates a PR
      (on success) or rejects the ticket back to the source with specific
      questions (on failure). Source-aware rejection routing ensures feedback
      reaches SMEs in their own tool.
    usage: "/pull-tickets [--concurrency N] [--team TEAM] [--project PROJECT] [--triage-only]"
    flow:
      verify_mcp:
        description: "Verify Linear MCP is connected, cache status map"
        on_failure: "Stop immediately — cannot process without rejection channel"
      pull_eligible:
        description: "Pull tickets in Todo status from configured team/project"
        on_failure: "Report zero tickets and exit"
      analyze_batch:
        description: "Detect cross-ticket dependencies, plan execution order"
      translate_to_prd:
        description: "Generate full 8-section PRD per ticket from content + codebase research"
        output: ".etc_sdlc/features/{ticket-id}/spec.md"
      build:
        description: "Run /build on generated PRD — full pipeline, all gates"
        on_failure: "Reject ticket back to source with specific questions"
      close_loop:
        description: "On success: create PR, update ticket to In Review, comment with summary"
      scope_gate:
        description: "If decomposition yields >15 leaf tasks, create sub-issues in Linear instead of building"
        on_failure: "Decompose into sub-tickets, comment on parent, move to Needs Clarification"
      triage_only:
        description: "Analyze and reorganize board without building — score complexity, map dependencies, decompose epics"
        on_failure: "N/A — triage is non-destructive, always succeeds"

  discovery:
    name: "discovery"
    description: >
      Archaeological investigation of an existing system. Reads code,
      data, git history, Salesforce metadata, and infrastructure configs
      to find what the system ACTUALLY is — not what the documentation
      claims. Stateful and resumable: writes findings to disk as it
      works, surfaces blocking access requests rather than guessing.
      Produces system-portrait.md, dependency-map.md, and complexity
      assessment that feed /roadmap.
    usage: "/discovery <one-line description of the investigation target>"
    source: skills/discovery/SKILL.md

  roadmap:
    name: "roadmap"
    description: >
      Strategic roadmap planning agent that refuses to plan toward fuzzy
      targets. Demands a clear target state through 5-phase interrogation
      (Why / What / Boundaries / Constraints / Validation), detects
      contradictions between scope and constraints, and produces phased
      roadmaps with entry/exit criteria. Pairs explicitly with /discovery
      for current-state input. Each roadmap phase becomes input to /spec.
    usage: "/roadmap <one-line description of the migration or transition>"
    source: skills/roadmap/SKILL.md

  retrospective:
    name: "retrospective"
    description: >
      Personal engineering coach that turns development sessions into
      structured learning. Extracts workflow improvements, identifies
      software engineering principles applied or missed, and surfaces
      architectural insights. Closes the learning loop alongside
      /postmortem (which traces specific incidents). Builds an
      institutional engineering playbook over time.
    usage: "/retrospective"
    source: skills/retrospective/SKILL.md

  harness-feedback:
    name: "harness-feedback"
    description: >
      User-invokable cross-project lesson capture. Takes a process
      failure observed in any project (research inversion, wasted
      time, manual workaround, framework surprise, near-miss gate,
      repeated mistake) and emits a structured `📬 Harness feedback`
      block per standards/process/harness-feedback-loop.md. Refuses
      vague reflections at the rubric level. When invoked inside the
      etc repo, can route the block directly to a /spec brief instead
      of requiring copy-paste. Distinct from /postmortem (per-project
      shipped bugs) — see the cross-skill contract in the SKILL.md.
    usage: "/harness-feedback [\"<one-line observation>\"]"
    source: skills/harness-feedback/SKILL.md

  # F011: /design wraps pbakaus/impeccable (Apache 2.0, ≥v3.0.7) as a discrete
  # phase on the design side of the (design | strategy) mid-funnel branch,
  # positioned BEFORE /spec in the 6-phase pipeline. Mirrors /architect's
  # 5-phase Socratic structure (intent capture → research → gray-area
  # resolution → 2.75 classification → section drafting → output). The first
  # phase to allocate `features/F<NNN>` when invoked first; /spec and
  # /architect on the same feature inherit feature_id from state.yaml.
  design:
    name: "design"
    description: >
      Design phase wrapping impeccable. Socratic design loop that dispatches
      /impeccable teach (wrap-and-invoke via the Skill tool, NOT subprocess)
      to capture PRODUCT.md + DESIGN.md, then resolves etc-specific gray
      areas impeccable does not natively cover (WCAG floor, motion-reduction
      respect, responsive breakpoint targets, user-flow state machines).
      Outputs design-tokens.json + component-specs.md consumed by /spec
      during AC authoring and by /build Step 6 dispatch context. Runs on
      the design side of the (design | strategy) mid-funnel branch, BEFORE
      /spec. Replaces the deprecated ux-designer + ui-designer agents.
    usage: "/design [<feature_path>] | /design --sync [--sync-from <path>] | /design --retrofit <feature_path>"
    source: skills/design/SKILL.md
    primary_phase: design
    model: opus

  journey:
    name: "journey"
    description: >
      SME-facing skill for capturing customer journeys. Walks a domain
      expert through 6 plain-English Socratic questions (plus one optional
      emotion question), refines their answers, and writes a structured
      journey artifact to docs/mvp/journeys/J-NNN-<slug>.md. Pairs with
      /spec via journey_refs in state.yaml.spec_phase. Designed for
      non-technical experts who LIVE the journey they're describing —
      forbidden vocabulary includes "acceptance criteria", "BR-",
      "stakeholder", "use case"; encouraged vocabulary includes "what
      they click", "where they get stuck", "how they feel". The
      intersection of captured journeys IS the MVP. F017.
    usage: "/journey [<one-liner>] | /journey --from-text <path> | /journey --refine J-<NNN> | /journey --list"
    source: skills/journey/SKILL.md
    primary_phase: spec
    model: opus

  efficiency:
    name: "efficiency"
    description: >
      Chief Efficiency Officer operator commands. Reviews evidence-cited
      proposals queued by the Stop-hook reflection layer (F019), reads
      the rolling daily efficiency report, queries operator velocity
      baseline (via sdlc_timing.py), and mutes threshold-push interrupts
      for defined windows. All observations are evidence-based — every
      proposal cites data points + operator baseline + gap; no
      hallucinated narrative. The CEO does NOT block work; this skill
      surfaces what the CEO observed for operator review. F019 /
      2026-05-15.
    usage: "/efficiency review | /efficiency today | /efficiency baseline | /efficiency mute --until <iso8601> --reason \"<text>\""
    source: skills/efficiency/SKILL.md
    primary_phase: meta
    model: opus

  janitor:
    name: "janitor"
    description: >
      Autonomous harness-cleanup orchestrator (Boy Scout rule + broken-windows).
      Surveys the repo, selects flawless-only cleanup, performs it in an ISOLATED
      git worktree cut from main, verifies the harness gates green, runs a
      mechanical pre-PR boundary check, and opens a pull request — never touching
      the operator's working tree or build. Two modes: interactive `/janitor` and
      hands-off `/janitor --autonomous` (ZERO prompts, for an operator-supplied
      scheduler). Janitor submits; a human merges. Never pushes origin/main,
      never self-merges, never bypasses git hooks, never disables the sandbox.
    usage: "/janitor [--autonomous]"
    source: skills/janitor/SKILL.md
    model: opus

