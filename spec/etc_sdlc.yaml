# ─── SDLC Phases ────────���────────────────────────────────────────────────
# Phase definitions compile to tracker templates in dist/sdlc/.
# Each phase has a Definition of Done that gates transition to the next.
#
# Locked 6-phase pipeline (F006 + F011):
#
#   strategy (business)
#       ↓
#     research
#       ↓
#   (design | strategy)        ← mid-funnel branch: user-facing surface OR
#       ↓                        internal/infra. /design wraps impeccable;
#                                /strategy is a future skill.
#      spec
#       ↓
#    architect
#       ↓
#      build
#       ↓
#    release
#
# The `(design | strategy)` branch sits BETWEEN research and spec. /design
# is the design side of the branch (F011); /strategy is the non-user-facing
# side (future PRD). Backend-only features route through strategy and skip
# /design; user-facing features route through /design and may set
# state.yaml.design_phase.tier_0_promoted = true (F011 BR-006).

phases:
  bootstrap:
    description: "Analyze existing code, generate .meta/, gap analysis"
    team: [project-bootstrapper, architect]
    definition_of_done:
      - ".meta/ descriptions exist for all top-level directories"
      - "Gap analysis document produced"
      - "Existing patterns and anti-patterns cataloged"

  # F011: `/design` phase wraps impeccable. Runs on the design side of the
  # (design | strategy) mid-funnel branch, positioned BEFORE /spec. First
  # phase to allocate `features/F<NNN>` when invoked first; /spec and
  # /architect inherit feature_id from state.yaml. Replaces the legacy
  # pre-F006 `design` entry which conflated design with architecture
  # (architect/ADR work moved to its own phase in F006).
  design:
    description: >
      Wrap-and-invoke impeccable for Socratic design capture. Produces
      PRODUCT.md + DESIGN.md (impeccable-owned), design-tokens.json +
      component-specs.md (etc-owned, consumed by /spec + /build), and
      state.yaml.design_phase (etc-owned phase metadata).
    branch: "(design | strategy)"
    branch_side: design
    runs_before: spec
    team: [design]
    definition_of_done:
      - "PRODUCT.md + DESIGN.md exist at repo root (via /impeccable teach)"
      - "design-tokens.json + component-specs.md written under <feature_path>/"
      - "gray-areas-design.md captures WCAG floor, motion-reduction, breakpoints"
      - "state.yaml.design_phase block written with classification + metrics"
      - "value-hypothesis.yaml.design_author_role field populated"
      - "Git tags etc/feature/F<NNN>/design/{start,done} written"
      - "tier_0_promoted set when feature has user-facing surface"

  # F011 placeholder: `/strategy` is the non-user-facing side of the
  # (design | strategy) mid-funnel branch. Skill body is a future PRD;
  # the phase entry is reserved here so the 6-phase pipeline is complete
  # in the manifest. Backend-only features route through this branch and
  # skip /design.
  strategy:
    description: >
      Non-user-facing side of the (design | strategy) mid-funnel branch.
      Skill body is a future PRD; phase reserved in the manifest so
      backend-only features have an explicit route that bypasses /design.
    branch: "(design | strategy)"
    branch_side: strategy
    runs_before: spec
    team: [product-manager, architect]
    definition_of_done:
      - "Strategy phase skill not yet implemented — future PRD"

  spec:
    description: "Gather requirements, write PRDs, validate domain model"
    team: [product-manager, product-owner, domain-modeler, researcher]
    definition_of_done:
      - "PRD exists with acceptance criteria for every feature"
      - "Domain model validated — ubiquitous language defined"
      - "Edge cases documented"
      - "Stakeholder review completed"

  # F006 split out the architecture phase from the legacy conflated `design`
  # entry. F011 repurposes the `design` key for /design (impeccable wrap);
  # architecture work lives here under `architect`.
  architect:
    description: "Architecture, ADRs, API contracts, data model, module structure"
    team: [architect, researcher, architect-reviewer]
    definition_of_done:
      - "design.md drafted (architecture overview, data model, API contracts,"
      - "  module structure, technical constraints, security considerations,"
      - "  trade-offs)"
      - "ADRs written for all significant technical decisions"
      - "gray-areas-architect.md captures resolved gray areas with citations"

  decompose:
    description: "Break specs into task graph with dependencies"
    team: [sem]
    definition_of_done:
      - "Task files generated in .etc_sdlc/tasks/"
      - "Each task meets task_format requirements"
      - "Dependency graph has no cycles"
      - "File-set isolation verified for parallel tasks"

  build:
    description: "Implement with TDD + continuous quality watchdogs"
    team: [backend-developer, frontend-developer, devops-engineer]
    watchdogs: [code-reviewer, verifier, security-reviewer]
    definition_of_done:
      - "All tasks completed and verified"
      - "Test coverage meets threshold"
      - "Type checking passes"
      - "Lint passes"
      - "All invariants hold"
      - "Security review completed"

  verify:
    description: "Stand up running system for human acceptance testing"
    team: [verifier, product-owner]
    definition_of_done:
      - "System runs end-to-end"
      - "Acceptance criteria verified against PRD"
      - "No critical or high-severity bugs"

  ship:
    description: "Documentation, deployment config, final verification"
    team: [technical-writer, devops-engineer, verifier]
    definition_of_done:
      - "API documentation complete"
      - "Deployment configuration ready"
      - "README updated"
      - "Final verification passed"

  evaluate:
    description: "Retrospective, metrics, lessons learned"
    team: [process-evaluator, sem]
    definition_of_done:
      - "Retrospective document produced"
      - "Metrics collected (coverage, velocity, defect rate)"
      - "Lessons learned captured"
      - "Recommendations for next iteration"
